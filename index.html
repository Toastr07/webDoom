<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>webDoom</title>

    <!-- js-dos style sheet -->
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">

    <!-- js-dos -->
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  </head>
  <body>
    <div id="dos" style="width: 640px; height: 400px;"></div>

    <script>
      Dos(document.getElementById("dos"), {
        url: "Doom.zip",
        dosboxConf: `[autoexec]
          mount c .
          c:
          DOOM.EXE
          exit`
      });
    </script>
  </body>
</html>
